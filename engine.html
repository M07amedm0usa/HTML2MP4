<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Engine - Ultimate Page Curl</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ─── الأساسيات ─── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #d8dde6; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'Kalam', cursive;
            -webkit-font-smoothing: antialiased;
        }

        #reel-container {
            width: 400px; height: 711px; background: #fafafa;
            background-image: radial-gradient(#ddd 1px, transparent 1px); background-size: 22px 22px;
            position: relative; border-radius: 16px; overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            perspective: 1500px;
        }

        #progress-bar {
            position: absolute; top: 0; left: 0; height: 5px;
            background: linear-gradient(90deg, #e74c3c, #8e44ad);
            width: 0%; transition: width linear; z-index: 500;
        }

        /* 🔥 تأثير ثنية الورقة (Diagonal Curl) 🔥 */
        .scene {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 32px 28px;
            background: #fafafa; z-index: 10; opacity: 0;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: clip-path 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s;
            gap: 15px;
        }

        .scene.active { opacity: 1; z-index: 20; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }

        /* حالة الخروج (المسح المائل) */
        .scene.exit {
            opacity: 1; z-index: 30;
            clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
        }

        /* لمعة الثنية المائلة */
        .scene::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(135deg, transparent 48%, rgba(255,255,255,0.9) 50%, rgba(0,0,0,0.05) 52%, transparent 55%);
            transform: rotate(0deg); transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            pointer-events: none; z-index: 40; opacity: 0;
        }
        .scene.exit::after { opacity: 1; transform: translate(-50%, 50%); }

        /* ─── ستايلات البوكسات ─── */
        .sketch-box { width: 100%; padding: 20px 24px; text-align: center; font-weight: 700; position: relative; }
        .style-8 { background: #fff; border: 3px solid currentColor; border-radius: 10px 255px 10px 255px / 255px 10px 255px 10px; }
        .style-5 { background: #282a36; color: #f8f8f2 !important; border-radius: 12px; padding-top: 35px; border: 1px solid #444; }
        .style-5::before { content: ''; position: absolute; top: 12px; right: 15px; width: 10px; height: 10px; border-radius: 50%; background: #ff5f56; box-shadow: -15px 0 0 #ffbd2e, -30px 0 0 #27c93f; }
        
        .box-title { font-size: 26px; margin-bottom: 8px; }
        .box-body { font-size: 20px; line-height: 1.4; }
        .c-purple { color: #8e44ad; } .c-black { color: #1a1a2e; }

        /* ─── القلم والحبر ─── */
        #pen-cursor { position: absolute; width: 60px; height: 60px; z-index: 100; top: 110%; left: 50%; transition: top 0.06s linear, left 0.06s linear; }
        .pen-writing { animation: markerWiggle 0.08s infinite; }
        @keyframes markerWiggle { 0% { transform: rotate(-10deg); } 100% { transform: rotate(-6deg); } }
        .char { opacity: 0; }
        #ink-canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div id="reel-container">
    <div id="progress-bar"></div>
    <canvas id="ink-canvas" width="400" height="711"></canvas>
    <div id="scenes-container"></div>
    <svg id="pen-cursor" viewBox="0 0 64 64"><rect x="22" y="3" width="18" height="40" rx="5" fill="#222" /><rect x="22" y="3" width="18" height="10" rx="4" fill="#e74c3c" /><path d="M22,43 L40,43 L33,57 L29,57 Z" fill="#e8dcc8" /><rect x="28" y="55" width="6" height="5" fill="#111"/></svg>
</div>

<script>
    // سيتم حقن البيانات من خلال Playwright أو استخدام هذه كداتا افتراضية
    let REEL_DATA = window.REEL_DATA || [
        { type: "box", style: "style-8", color: "c-purple", title: "بداية الأتمتة 🤖", content: "الريندر شغال الآن\nعلى GitHub Actions" },
        { type: "box", style: "style-5", color: "c-black", title: "Terminal Log", content: "Render Status: 200 OK\nQuality: 1080p 60fps" }
    ];

    function build() {
        const container = document.getElementById('scenes-container');
        REEL_DATA.forEach((data, i) => {
            const sc = document.createElement('div'); sc.className = 'scene';
            sc.innerHTML = `<div class="sketch-box ${data.style} ${data.color}"><div class="box-title">${data.title}</div><div class="box-body">${data.content.replace(/\n/g, '<br>')}</div></div>`;
            container.appendChild(sc);
        });
        // تقسيم النصوص لحروف للكتابة
        document.querySelectorAll('.box-title, .box-body').forEach(el => {
            const text = el.innerText; el.innerHTML = '';
            [...text].forEach(ch => { const s = document.createElement('span'); s.className = 'char'; s.textContent = ch; el.appendChild(s); });
        });
    }

    const canvas = document.getElementById('ink-canvas');
    const ctx = canvas.getContext('2d');
    let lastX = -1, lastY = -1;

    async function write(scene) {
        const chars = scene.querySelectorAll('.char');
        const pen = document.getElementById('pen-cursor');
        const cont = document.getElementById('reel-container').getBoundingClientRect();
        ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';

        for (let i = 0; i < chars.length; i++) {
            pen.classList.add('pen-writing');
            chars[i].style.opacity = '1';
            const r = chars[i].getBoundingClientRect();
            const x = r.left - cont.left + r.width/2;
            const y = r.top - cont.top + r.height*0.8;
            pen.style.left = (x-30)+'px'; pen.style.top = (y-55)+'px';
            if(lastX!==-1) { ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x,y); ctx.stroke(); }
            lastX=x; lastY=y; await new Promise(r => setTimeout(r, 45));
        }
        pen.classList.remove('pen-writing'); pen.style.top = '110%'; lastX=-1;
    }

    async function startReel() {
        build();
        const scenes = document.querySelectorAll('.scene');
        document.getElementById('progress-bar').style.transition = `width 15s linear`;
        setTimeout(() => document.getElementById('progress-bar').style.width = '100%', 100);

        for (let i = 0; i < scenes.length; i++) {
            ctx.clearRect(0,0,400,711);
            scenes[i].classList.add('active');
            await new Promise(r => setTimeout(r, 1000));
            await write(scenes[i]);
            await new Promise(r => setTimeout(r, 2000));
            if (i < scenes.length - 1) {
                scenes[i].classList.add('exit');
                await new Promise(r => setTimeout(r, 1300));
            } else {
                // ✅ الإشارة لـ Playwright بالانتهاء
                document.getElementById('progress-bar').setAttribute('data-status', 'finished');
            }
        }
    }

    // تشغيل تلقائي
    window.onload = () => setTimeout(startReel, 500);
</script>
</body>
</html>
