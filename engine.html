<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* نفس الـ CSS بتاعك بالظبط بدون تغيير */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #d8dde6; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Kalam', cursive; }
        #reel-container { width: 400px; height: 711px; background: #fafafa; background-image: radial-gradient(#ddd 1px, transparent 1px); background-size: 22px 22px; position: relative; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        #progress-bar { position: absolute; top: 0; left: 0; height: 5px; background: linear-gradient(90deg, #e74c3c, #8e44ad); width: 0%; transition: width linear; z-index: 200; }
        .scene { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px 28px; opacity: 0; transform: translateY(15px) scale(0.95); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; z-index: 20; gap: 15px; }
        .scene.active { opacity: 1; transform: translateY(0) scale(1); }
        .sketch-box { width: 100%; padding: 20px 24px; text-align: center; font-weight: 700; line-height: 1.5; transition: all 0.3s; position: relative; }
        .box-title { font-size: 28px; margin-bottom: 10px; }
        .box-body { font-size: 22px; }
        .c-black { color: #1a1a2e; } .c-red { color: #c0392b; } .c-blue { color: #1a6bb5; } .c-green { color: #1e8449; } .c-purple { color: #8e44ad; } .c-orange { color: #e67e22; } .c-teal { color: #16a085; } .c-magenta { color: #e84393; }
        .style-1 { background: #fff; border: 3px solid currentColor; border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px; box-shadow: 4px 4px 0 rgba(0,0,0,0.09); }
        .style-2 { background: #fff9c4; border: 2px solid #f39c12; color: #1a1a2e !important; border-radius: 2px 15px 2px 15px; box-shadow: 6px 8px 0 rgba(243, 156, 18, 0.2); transform: rotate(-2deg); }
        .style-4 { background: #2c3e50; border: 3px solid #34495e; color: #ecf0f1 !important; border-radius: 15px 225px 15px 255px / 255px 15px 225px 15px; box-shadow: 4px 4px 0 rgba(44, 62, 80, 0.4); transform: rotate(1deg); }
        .style-5 { background: #282a36; color: #f8f8f2 !important; border-radius: 12px; padding-top: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #444; }
        .style-5::before { content: ''; position: absolute; top: 12px; right: 15px; width: 12px; height: 12px; border-radius: 50%; background: #ff5f56; box-shadow: -20px 0 0 #ffbd2e, -40px 0 0 #27c93f; }
        .style-8 { background: #fff; border: 3px solid currentColor; border-radius: 10px 255px 10px 255px / 255px 10px 255px 10px; box-shadow: 5px 5px 0 rgba(0,0,0,0.05), -2px -2px 0 currentColor; }
        .code-block { background: #1a1a2e; color: #a8ff78; font-family: 'Courier New', monospace; font-size: 16px; border-radius: 10px; padding: 15px; width: 100%; text-align: left; direction: ltr; margin-top: 10px; line-height: 1.6; }
        #pen-cursor { position: absolute; width: 64px; height: 64px; z-index: 150; top: 110%; left: 50%; transition: top 0.07s linear, left 0.07s linear; }
        @keyframes markerWiggle { 0% { transform: rotate(-12deg) translateY(0); } 50% { transform: rotate(-8deg) translateY(-2px); } 100% { transform: rotate(-12deg) translateY(0); } }
        .pen-writing { animation: markerWiggle 0.1s infinite; }
        .char { opacity: 0; }
        #ink-canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="reel-container">
        <div id="progress-bar"></div>
        <canvas id="ink-canvas" width="400" height="711"></canvas>
        <div id="scenes-container"></div>
        <svg id="pen-cursor" viewBox="0 0 64 64"><rect x="22" y="3" width="18" height="40" rx="5" fill="#222831"/><rect x="22" y="3" width="18" height="10" rx="4" fill="#e74c3c"/><path d="M22,43 L40,43 L33,57 L29,57 Z" fill="#e8dcc8"/><rect x="28" y="55" width="6" height="5" rx="1" fill="#111"/></svg>
    </div>

    <script>
        // 🔗 الربط مع ملف البيانات الخارجي
        let REEL_DATA = window.REEL_DATA || [];

        const inkColors = { 'c-red': '#c0392b', 'c-blue': '#1a6bb5', 'c-green': '#1e8449', 'c-black': '#1a1a2e', 'c-purple': '#8e44ad', 'c-orange': '#e67e22', 'c-teal': '#16a085', 'c-magenta': '#e84393' };

        function buildScenes() {
            const container = document.getElementById('scenes-container');
            container.innerHTML = '';
            REEL_DATA.forEach((data, index) => {
                let html = data.type === 'code' ? 
                    `<div class="sketch-box ${data.style} ${data.color}"><div class="box-title">${data.title}</div><div class="code-block">${data.code.replace(/\n/g, '<br>')}</div></div>` :
                    `<div class="sketch-box ${data.style} ${data.color}"><div class="box-title">${data.title}</div><div class="box-body">${data.content.replace(/\n/g, '<br>')}</div></div>`;
                const div = document.createElement('div');
                div.className = 'scene'; div.id = `scene-${index}`; div.innerHTML = html;
                div.dataset.color = (data.style === 'style-4' || data.style === 'style-5') ? '#a8ff78' : (inkColors[data.color] || '#1a1a2e');
                container.appendChild(div);
            });
            // تجهيز الحروف
            document.querySelectorAll('.scene').forEach(scene => {
                const walker = document.createTreeWalker(scene, NodeFilter.SHOW_TEXT, null, false);
                let n; const nodes = [];
                while ((n = walker.nextNode())) { if (n.nodeValue.trim()) nodes.push(n); }
                nodes.forEach(node => {
                    const frag = document.createDocumentFragment();
                    Array.from(node.nodeValue).forEach(ch => { const s = document.createElement('span'); s.className = 'char'; s.textContent = ch; frag.appendChild(s); });
                    node.parentNode.replaceChild(frag, node);
                });
            });
        }

        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        let lx = -1, ly = -1;

        async function writeScene(scene) {
            const chars = scene.querySelectorAll('.char');
            const pen = document.getElementById('pen-cursor');
            const cont = document.getElementById('reel-container').getBoundingClientRect();
            let curColor = scene.dataset.color;
            return new Promise(resolve => {
                let i = 0;
                function step() {
                    if (i < chars.length) {
                        pen.classList.add('pen-writing'); chars[i].style.opacity = '1';
                        const r = chars[i].getBoundingClientRect();
                        const x = r.left - cont.left + r.width/2; const y = r.top - cont.top + r.height*0.85;
                        pen.style.left = (x-31)+'px'; pen.style.top = (y-60)+'px';
                        if (lx !== -1 && chars[i].textContent.trim()) {
                            ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(x, y);
                            ctx.strokeStyle = curColor; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.globalAlpha = 0.4; ctx.stroke();
                        }
                        lx = x; ly = y; i++; setTimeout(step, 50);
                    } else { pen.classList.remove('pen-writing'); pen.style.top = '110%'; lx = -1; ly = -1; resolve(); }
                }
                step();
            });
        }

        async function startReel() {
            buildScenes();
            const scenes = document.querySelectorAll('.scene');
            let total = 0; scenes.forEach(s => total += (s.querySelectorAll('.char').length * 50) + 2500);
            document.getElementById('progress-bar').style.transition = `width ${total/1000}s linear`;
            setTimeout(() => document.getElementById('progress-bar').style.width = '100%', 100);

            for (let i = 0; i < scenes.length; i++) {
                ctx.clearRect(0,0,400,711); scenes[i].classList.add('active');
                await new Promise(r => setTimeout(r, 600));
                await writeScene(scenes[i]);
                await new Promise(r => setTimeout(r, 1500));
                if (i < scenes.length - 1) { scenes[i].classList.remove('active'); await new Promise(r => setTimeout(r, 500)); }
            }
            // ✅ العلامة اللي GitHub Action مستنيها
            document.getElementById('progress-bar').setAttribute('data-done', 'true');
        }
        // مبيشتغلش لوحده عشان البايثون هو اللي هيشغله بالداتا
    </script>
</body>
                                                                                                                                                                                                                                               </html>
