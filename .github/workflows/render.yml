name: Automated Video Render
on:
  push:
    paths:
      - 'assets/**' # يشتغل لما n8n يرفع ملفات جديدة فيassets
  workflow_dispatch: # زرار تشغيل يدوي للتجربة

jobs:
  render_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install playwright
          playwright install chromium --with-deps

      - name: Execute Render Script
        run: python render_pro.py

      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: Final-Instagram-Reel
          # تأكدنا إن المسار مطابق للي في البايثون (output/final_video.mp4)
          path: output/final_video.mp4
          if-no-files-found: error
          
